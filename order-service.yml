server:
  port: 8084

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/order_db
    username: root
    password: 12345

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: "*"